version: '3.8'
services:
  # Application Laravel (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: laravel-app
    container_name: laravel-app
    restart: unless-stopped
    volumes:
      - .:/var/www
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy

  # Serveur Web Nginx
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network

  # Base de données PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: xsel_gestion_backend
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d xsel_gestion_backend"]
      interval: 5s
      timeout: 5s
      retries: 5


  adminer:
    image: adminer:latest
    container_name: xgb-adminer
    ports:
      - "6060:8080"
    # environment:
    #   ADMINER_DESIGN: galkaev
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped


networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
